<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Transferir Saldo</title>
  <style>
    :root {
      --bg: #f4f7fb;
      --card: #ffffff;
      --text: #142033;
      --muted: #5b6b82;
      --line: #dbe4f0;
      --primary: #0b63ce;
      --primary-dark: #084c9e;
      --info: #edf4ff;
      --info-text: #1b4f9f;
      --ok: #eaf8ee;
      --ok-text: #156738;
      --error: #fdeeee;
      --error-text: #a12626;
      --shadow: 0 20px 50px rgba(18, 39, 73, 0.08);
    }
    * { box-sizing: border-box; }
    body {
      margin: 0;
      font-family: "Segoe UI", Tahoma, Geneva, Verdana, sans-serif;
      color: var(--text);
      background: linear-gradient(180deg, #ebf2fb 0%, var(--bg) 100%);
      min-height: 100vh;
    }
    .shell {
      width: min(900px, calc(100% - 28px));
      margin: 24px auto;
    }
    .back {
      display: inline-block;
      margin-bottom: 18px;
      color: var(--primary);
      text-decoration: none;
      font-weight: 700;
    }
    .topbar {
      display: flex;
      justify-content: space-between;
      align-items: center;
      gap: 12px;
      margin-bottom: 18px;
      flex-wrap: wrap;
    }
    .card {
      background: var(--card);
      border: 1px solid var(--line);
      border-radius: 26px;
      padding: 24px;
      box-shadow: var(--shadow);
    }
    h1 { margin: 0 0 10px; }
    p { color: var(--muted); line-height: 1.55; }
    label {
      display: block;
      margin-top: 16px;
      margin-bottom: 8px;
      font-weight: 700;
    }
    .quick-amounts {
      display: flex;
      flex-wrap: wrap;
      gap: 8px;
      margin-top: 12px;
    }
    .quick-amount {
      border: 1px solid #cfe0f6;
      background: #f4f8ff;
      color: #184f9b;
      border-radius: 12px;
      padding: 10px 12px;
      font-size: .92rem;
      font-weight: 700;
      cursor: pointer;
    }
    .quick-amount:hover {
      background: #eaf2ff;
    }
    .search-wrap {
      position: relative;
    }
    input {
      width: 100%;
      padding: 13px 14px;
      border-radius: 14px;
      border: 1px solid #c4d2e3;
      background: #f8fbff;
      font-size: 1rem;
    }
    .status {
      margin-top: 14px;
      padding: 13px 14px;
      border-radius: 16px;
      background: var(--info);
      color: var(--info-text);
      font-weight: 600;
      border: 1px solid #d7e5fb;
    }
    .status.ok {
      background: var(--ok);
      color: var(--ok-text);
      border-color: #c8e8d0;
    }
    .status.error {
      background: var(--error);
      color: var(--error-text);
      border-color: #f0caca;
    }
    .results {
      position: absolute;
      top: calc(100% + 6px);
      left: 0;
      right: 0;
      border: 1px solid var(--line);
      border-radius: 18px;
      overflow: hidden;
      background: #ffffff;
      min-height: 0;
      max-height: 320px;
      overflow-y: auto;
      box-shadow: 0 18px 35px rgba(18, 39, 73, 0.12);
      z-index: 20;
    }
    .empty {
      padding: 16px;
      color: var(--muted);
    }
    .item {
      width: 100%;
      border: 0;
      border-bottom: 1px solid #e9eef6;
      background: transparent;
      padding: 14px 16px;
      text-align: left;
      cursor: pointer;
    }
    .item:hover {
      background: #edf4ff;
    }
    .hidden {
      display: none;
    }
    .recent {
      margin-top: 14px;
      display: grid;
      gap: 10px;
    }
    .recent-section {
      margin-top: 24px;
      padding-top: 18px;
      border-top: 1px solid #e4ebf5;
    }
    .recent-header {
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 12px;
      margin-bottom: 6px;
    }
    .recent-title {
      margin: 0;
      font-size: 1.08rem;
      font-weight: 800;
      color: var(--text);
      letter-spacing: -0.02em;
    }
    .recent-caption {
      margin: 0;
      color: var(--muted);
      font-size: 0.9rem;
    }
    .recent-item {
      display: grid;
      grid-template-columns: 1fr auto;
      gap: 8px 14px;
      padding: 14px 16px;
      border-radius: 16px;
      background: #f8fbff;
      border: 1px solid rgba(163, 186, 218, 0.24);
    }
    .recent-main {
      font-weight: 700;
      color: var(--text);
    }
    .recent-sub {
      color: var(--muted);
      font-size: 0.9rem;
    }
    .recent-amount {
      font-weight: 800;
      color: var(--primary);
      align-self: center;
      font-variant-numeric: tabular-nums;
    }
    button.action {
      margin-top: 18px;
      border: 0;
      border-radius: 14px;
      padding: 13px 18px;
      background: var(--primary);
      color: #fff;
      font-size: .98rem;
      font-weight: 700;
      cursor: pointer;
    }
    button.action:hover { background: var(--primary-dark); }
    button.action:disabled { opacity: .6; cursor: wait; }
  </style>
</head>
<body>
  <div class="shell">
    <div class="topbar">
      <a class="back" href="/">&larr; Panel</a>
      <button class="action" id="refreshBtn" type="button" style="margin-top:0;">Refresh</button>
    </div>

    <section class="card">
      <h1>Transferir</h1>

      <label for="userSearch">Usuario</label>
      <div class="search-wrap">
        <input id="userSearch" type="text" placeholder="Ejemplo: MMATOVELLE01" autocomplete="off">
        <div class="results hidden" id="results">
          <div class="empty">Escribe para buscar.</div>
        </div>
      </div>

      <label for="amountInput">Monto</label>
      <input id="amountInput" type="number" min="0.01" step="0.01" placeholder="1.00">
      <div class="quick-amounts">
        <button type="button" class="quick-amount" data-amount="5.00">$5.00</button>
        <button type="button" class="quick-amount" data-amount="6.00">$6.00</button>
        <button type="button" class="quick-amount" data-amount="8.00">$8.00</button>
        <button type="button" class="quick-amount" data-amount="10.00">$10.00</button>
        <button type="button" class="quick-amount" data-amount="20.00">$20.00</button>
      </div>

      <div class="status" id="status">Sin usuario.</div>

      <button class="action" id="transferBtn">Transferir ahora</button>

      <section class="recent-section">
        <div class="recent-header">
          <h2 class="recent-title">Ultimas 5 recargas</h2>
        </div>
        <p class="recent-caption">Movimientos recientes.</p>
        <div class="recent" id="recentList">
          <div class="recent-sub">Sin recargas.</div>
        </div>
      </section>
    </section>
  </div>

  <script>
    const USERS_CACHE_KEY = "lasplatas_users_cache";
    const RECHARGES_CACHE_KEY = "lasplatas_recharges_cache";
    const state = { users: [], selectedUser: null };
    const userSearchEl = document.getElementById("userSearch");
    const amountInputEl = document.getElementById("amountInput");
    const statusEl = document.getElementById("status");
    const resultsEl = document.getElementById("results");
    const transferBtn = document.getElementById("transferBtn");
    const refreshBtn = document.getElementById("refreshBtn");
    const recentListEl = document.getElementById("recentList");
    const quickAmountEls = document.querySelectorAll(".quick-amount");

    function setStatus(message, kind = "") {
      statusEl.textContent = message;
      statusEl.className = `status ${kind}`.trim();
    }

    function showResults(html) {
      resultsEl.innerHTML = html;
      resultsEl.classList.remove("hidden");
    }

    function hideResults() {
      resultsEl.classList.add("hidden");
    }

    async function api(path, options = {}) {
      const headers = new Headers(options.headers || {});
      if (options.body && !headers.has("Content-Type")) {
        headers.set("Content-Type", "application/json");
      }
      const response = await fetch(path, { ...options, headers, credentials: "same-origin" });
      const text = await response.text();
      const data = text ? JSON.parse(text) : {};
      if (!response.ok) {
        throw new Error(data.error || `Error ${response.status}`);
      }
      return data;
    }

    function saveUsersCache(users) {
      localStorage.setItem(USERS_CACHE_KEY, JSON.stringify(users));
    }

    function loadUsersCache() {
      try {
        const raw = localStorage.getItem(USERS_CACHE_KEY);
        return raw ? JSON.parse(raw) : [];
      } catch {
        return [];
      }
    }

    function saveRechargesCache(rows) {
      localStorage.setItem(RECHARGES_CACHE_KEY, JSON.stringify(rows));
    }

    function loadRechargesCache() {
      try {
        const raw = localStorage.getItem(RECHARGES_CACHE_KEY);
        return raw ? JSON.parse(raw) : [];
      } catch {
        return [];
      }
    }

    function renderRecent(rows) {
      recentListEl.innerHTML = "";
      if (!rows.length) {
        recentListEl.innerHTML = '<div class="recent-sub">Sin recargas.</div>';
        return;
      }

      rows.forEach((row) => {
        const item = document.createElement("div");
        item.className = "recent-item";
        item.innerHTML = `
          <div>
            <div class="recent-main">${row.toUsername || "-"}</div>
            <div class="recent-sub">${row.dateTime || ""}</div>
          </div>
          <div class="recent-amount">$${Number(row.amount || 0).toFixed(2)}</div>
        `;
        recentListEl.appendChild(item);
      });
    }

    async function loadRecent() {
      const data = await api("/api/recent-recharges");
      const rows = Array.isArray(data.rows) ? data.rows : [];
      saveRechargesCache(rows);
      renderRecent(rows);
    }

    function renderResults(query) {
      const normalized = query.trim().toUpperCase();
      if (!normalized) {
        showResults('<div class="empty">Escribe para buscar.</div>');
        return;
      }

      const matches = state.users
        .filter((user) => String(user.username || "").toUpperCase().startsWith(normalized))
        .slice(0, 15);

      if (!matches.length) {
        showResults('<div class="empty">Sin resultados.</div>');
        return;
      }

      resultsEl.innerHTML = "";
      resultsEl.classList.remove("hidden");
      matches.forEach((user) => {
        const button = document.createElement("button");
        button.type = "button";
        button.className = "item";
        button.textContent = `${user.username} | ID ${user.userId}`;
        button.addEventListener("click", () => {
          state.selectedUser = user;
          userSearchEl.value = user.username;
          setStatus(`${user.username} | ID ${user.userId}`);
          hideResults();
        });
        resultsEl.appendChild(button);
      });
    }

    userSearchEl.addEventListener("input", (event) => {
      state.selectedUser = null;
      setStatus("Sin usuario.");
      renderResults(event.target.value);
    });

    userSearchEl.addEventListener("focus", () => {
      renderResults(userSearchEl.value);
    });

    document.addEventListener("click", (event) => {
      if (!resultsEl.contains(event.target) && event.target !== userSearchEl) {
        hideResults();
      }
    });

    quickAmountEls.forEach((button) => {
      button.addEventListener("click", () => {
        amountInputEl.value = button.dataset.amount || "";
      });
    });

    refreshBtn.addEventListener("click", async () => {
      refreshBtn.disabled = true;
      setStatus("Refresh...");
      try {
        const data = await api("/api/refresh", { method: "POST" });
        state.users = Array.isArray(data.users) ? data.users : [];
        saveUsersCache(state.users);
        await loadRecent();
        setStatus(`${state.users.length} usuarios.`);
      } catch (error) {
        setStatus(error.message, "error");
      } finally {
        refreshBtn.disabled = false;
      }
    });

    transferBtn.addEventListener("click", async () => {
      const amount = Number(amountInputEl.value);
      if (!state.selectedUser) {
        setStatus("Selecciona usuario.", "error");
        return;
      }
      if (!Number.isFinite(amount) || amount <= 0) {
        setStatus("Monto inválido.", "error");
        return;
      }

      transferBtn.disabled = true;
      setStatus("Enviando...");
      try {
        await api("/api/transfer", {
          method: "POST",
          body: JSON.stringify({
            amount,
            targetUserId: Number(state.selectedUser.userId)
          })
        });
        await loadRecent();
        amountInputEl.value = "";
        setStatus(`Enviado: ${state.selectedUser.username} $${amount.toFixed(2)}.`, "ok");
      } catch (error) {
        setStatus(error.message, "error");
      } finally {
        transferBtn.disabled = false;
      }
    });

    async function initialize() {
      const cachedUsers = loadUsersCache();
      const cachedRecharges = loadRechargesCache();
      if (cachedUsers.length) {
        state.users = cachedUsers;
        setStatus(`${state.users.length} usuarios.`);
      }
      if (cachedRecharges.length) {
        renderRecent(cachedRecharges);
      }

      try {
        const data = await api("/api/init");
        state.users = Array.isArray(data.users) ? data.users : [];
        saveUsersCache(state.users);
        await loadRecent();
      } catch (error) {
        setStatus(error.message, "error");
      }
    }

    initialize();
  </script>
</body>
</html>
