<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Iniciar Sesión</title>
  <style>
    :root {
      --bg: #eef4fb;
      --card: #ffffff;
      --text: #13253f;
      --muted: #61738d;
      --line: #dbe4f0;
      --primary: #1663d6;
      --primary-dark: #0d4fae;
      --error-bg: #fff0f0;
      --error-text: #a22929;
      --shadow: 0 26px 60px rgba(19, 37, 63, 0.10);
    }
    * { box-sizing: border-box; }
    body {
      margin: 0;
      min-height: 100vh;
      display: grid;
      place-items: center;
      font-family: "Segoe UI", Tahoma, Geneva, Verdana, sans-serif;
      color: var(--text);
      background:
        radial-gradient(circle at top left, rgba(22, 99, 214, 0.14), transparent 28%),
        linear-gradient(180deg, #f5f8fc 0%, var(--bg) 100%);
    }
    .card {
      width: min(420px, calc(100% - 24px));
      background: var(--card);
      border: 1px solid var(--line);
      border-radius: 26px;
      padding: 24px;
      box-shadow: var(--shadow);
    }
    .eyebrow {
      display: inline-block;
      padding: 7px 11px;
      border-radius: 999px;
      font-size: .78rem;
      font-weight: 800;
      text-transform: uppercase;
      letter-spacing: .06em;
      background: #eef5ff;
      color: #1a4f9c;
    }
    h1 {
      margin: 16px 0 8px;
      font-size: 2rem;
      line-height: 1;
    }
    p {
      margin: 0 0 18px;
      color: var(--muted);
    }
    label {
      display: block;
      margin: 14px 0 8px;
      font-weight: 700;
    }
    input {
      width: 100%;
      padding: 13px 14px;
      border-radius: 14px;
      border: 1px solid #c6d4e6;
      background: #f8fbff;
      font-size: 1rem;
    }
    button {
      width: 100%;
      margin-top: 18px;
      border: 0;
      border-radius: 14px;
      padding: 14px 16px;
      background: linear-gradient(135deg, var(--primary) 0%, #3b86f2 100%);
      color: #fff;
      font-size: .98rem;
      font-weight: 800;
      cursor: pointer;
    }
    button:hover { background: linear-gradient(135deg, var(--primary-dark) 0%, #2b74df 100%); }
    button:disabled { opacity: .6; cursor: wait; }
    .status {
      margin-top: 14px;
      padding: 12px 13px;
      border-radius: 14px;
      background: #eef5ff;
      color: #1a4f9c;
      font-weight: 600;
    }
    .status.error {
      background: var(--error-bg);
      color: var(--error-text);
    }
  </style>
</head>
<body>
  <section class="card">
    <div class="eyebrow">Login</div>
    <h1>LasPlatas</h1>
    <p>Inicia una sola vez.</p>

    <label for="username">Usuario</label>
    <input id="username" type="text" autocomplete="username">

    <label for="password">Contraseña</label>
    <input id="password" type="password" autocomplete="current-password">

    <div class="status" id="status">Listo.</div>
    <button id="loginBtn" type="button">Entrar</button>
  </section>

  <script>
    const usernameEl = document.getElementById("username");
    const passwordEl = document.getElementById("password");
    const statusEl = document.getElementById("status");
    const loginBtn = document.getElementById("loginBtn");

    function setStatus(message, error = false) {
      statusEl.textContent = message;
      statusEl.className = error ? "status error" : "status";
    }

    async function api(path, options = {}) {
      const headers = new Headers(options.headers || {});
      if (options.body && !headers.has("Content-Type")) {
        headers.set("Content-Type", "application/json");
      }
      const response = await fetch(path, { ...options, headers, credentials: "same-origin" });
      const text = await response.text();
      const data = text ? JSON.parse(text) : {};
      if (!response.ok) {
        throw new Error(data.error || `Error ${response.status}`);
      }
      return data;
    }

    async function checkSession() {
      try {
        const data = await api("/api/session");
        if (data.configured) {
          window.location.replace("/");
        }
      } catch {
      }
    }

    loginBtn.addEventListener("click", async () => {
      const username = usernameEl.value.trim();
      const password = passwordEl.value;
      if (!username || !password) {
        setStatus("Completa usuario y contraseña.", true);
        return;
      }

      loginBtn.disabled = true;
      setStatus("Entrando...");
      try {
        await api("/api/login", {
          method: "POST",
          body: JSON.stringify({ username, password })
        });
        window.location.replace("/");
      } catch (error) {
        setStatus(error.message, true);
      } finally {
        loginBtn.disabled = false;
      }
    });

    checkSession();
  </script>
</body>
</html>
