<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Consultar Saldos</title>
  <style>
    :root {
      --bg: #f4f7fb;
      --card: #ffffff;
      --text: #142033;
      --muted: #5b6b82;
      --line: #dbe4f0;
      --primary: #0b63ce;
      --primary-dark: #084c9e;
      --info: #edf4ff;
      --shadow: 0 20px 50px rgba(18, 39, 73, 0.08);
    }
    * { box-sizing: border-box; }
    body {
      margin: 0;
      font-family: "Segoe UI", Tahoma, Geneva, Verdana, sans-serif;
      color: var(--text);
      background: linear-gradient(180deg, #ebf2fb 0%, var(--bg) 100%);
      min-height: 100vh;
    }
    .shell {
      width: min(1000px, calc(100% - 28px));
      margin: 24px auto;
    }
    .topbar {
      display: flex;
      justify-content: space-between;
      gap: 12px;
      align-items: center;
      margin-bottom: 18px;
      flex-wrap: wrap;
    }
    .back {
      color: var(--primary);
      text-decoration: none;
      font-weight: 700;
    }
    .top-actions {
      display: flex;
      gap: 10px;
      flex-wrap: wrap;
    }
    .card {
      background: var(--card);
      border: 1px solid var(--line);
      border-radius: 26px;
      padding: 24px;
      box-shadow: var(--shadow);
    }
    h1 { margin: 0 0 10px; }
    p { color: var(--muted); line-height: 1.55; }
    .meta {
      margin-top: 14px;
      padding: 13px 14px;
      border-radius: 16px;
      background: var(--info);
      color: #1b4f9f;
      font-weight: 600;
    }
    button {
      border: 0;
      border-radius: 14px;
      padding: 13px 18px;
      background: var(--primary);
      color: #fff;
      font-size: .98rem;
      font-weight: 700;
      cursor: pointer;
    }
    button:hover { background: var(--primary-dark); }
    button:disabled { opacity: .6; cursor: wait; }
    table {
      width: 100%;
      border-collapse: collapse;
      margin-top: 18px;
    }
    th, td {
      padding: 14px 16px;
      border-bottom: 1px solid #e9eef6;
      text-align: left;
    }
    th {
      background: #edf4ff;
      color: #284669;
      font-size: .88rem;
      text-transform: uppercase;
    }
    .money {
      text-align: right;
      font-weight: 700;
      font-variant-numeric: tabular-nums;
    }
  </style>
</head>
<body>
  <div class="shell">
    <div class="topbar">
      <a class="back" href="/">&larr; Panel</a>
      <div class="top-actions">
        <button id="refreshBtn" type="button">Refresh</button>
      </div>
    </div>

    <section class="card">
      <h1>Saldos</h1>
      <div class="meta" id="meta">Listo.</div>
      <button id="loadBtn">Actualizar top 10</button>

      <table>
        <thead>
          <tr>
            <th>#</th>
            <th>Usuario</th>
            <th class="money">Saldo (USD)</th>
          </tr>
        </thead>
        <tbody id="tableBody">
          <tr><td colspan="3">Sin datos.</td></tr>
        </tbody>
      </table>
    </section>
  </div>

  <script>
    const TOP_CACHE_KEY = "lasplatas_top_cache";
    const loadBtn = document.getElementById("loadBtn");
    const refreshBtn = document.getElementById("refreshBtn");
    const metaEl = document.getElementById("meta");
    const tableBody = document.getElementById("tableBody");

    async function api(path) {
      const response = await fetch(path, { credentials: "same-origin" });
      const text = await response.text();
      const data = text ? JSON.parse(text) : {};
      if (!response.ok) {
        throw new Error(data.error || `Error ${response.status}`);
      }
      return data;
    }

    function saveTopCache(rows) {
      localStorage.setItem(TOP_CACHE_KEY, JSON.stringify(rows));
    }

    function loadTopCache() {
      try {
        const raw = localStorage.getItem(TOP_CACHE_KEY);
        return raw ? JSON.parse(raw) : [];
      } catch {
        return [];
      }
    }

    function renderRows(rows) {
      tableBody.innerHTML = "";
      if (!rows.length) {
        tableBody.innerHTML = '<tr><td colspan="3">No se encontraron saldos.</td></tr>';
        return;
      }
      rows.forEach((row, index) => {
        const tr = document.createElement("tr");
        tr.innerHTML = `
          <td>${index + 1}</td>
          <td>${row.username}</td>
          <td class="money">$${Number(row.balance || 0).toFixed(2)}</td>
        `;
        tableBody.appendChild(tr);
      });
    }

    loadBtn.addEventListener("click", async () => {
      loadBtn.disabled = true;
      metaEl.textContent = "Consultando...";
      try {
        const data = await api("/api/top");
        const rows = Array.isArray(data.rows) ? data.rows : [];
        renderRows(rows);
        saveTopCache(rows);
        metaEl.textContent = `${rows.length} usuarios.`;
      } catch (error) {
        metaEl.textContent = error.message;
      } finally {
        loadBtn.disabled = false;
      }
    });

    refreshBtn.addEventListener("click", async () => {
      refreshBtn.disabled = true;
      metaEl.textContent = "Refresh...";
      try {
        await api("/api/refresh", { method: "POST" });
        localStorage.removeItem(TOP_CACHE_KEY);
        metaEl.textContent = "Listo.";
      } catch (error) {
        metaEl.textContent = error.message;
      } finally {
        refreshBtn.disabled = false;
      }
    });

    const cachedRows = loadTopCache();
    if (cachedRows.length) {
      renderRows(cachedRows);
      metaEl.textContent = `${cachedRows.length} usuarios.`;
    }
  </script>
</body>
</html>
